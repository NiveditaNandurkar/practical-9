<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Girls Aesthetic UI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
    color:white;
    transition:0.5s;
}

/* 💖 BACKGROUND (Aesthetic Pink Theme) */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url("https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=1600&auto=format&fit=crop");
    background-size:cover;
    background-position:center;
    z-index:-1;
}

/* DARK MODE */
.dark{
    background:#111;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
    background:rgba(0,0,0,0.6);
}

nav h1{
    color:#ff69b4;
}

nav button{
    padding:8px 15px;
    border:none;
    background:#ff69b4;
    cursor:pointer;
    color:#fff;
}

/* HERO */
.hero{
    text-align:center;
    padding:100px 20px;
    animation:fadeIn 2s;
}

.hero h2{
    font-size:50px;
    color:#ff69b4;
}

.hero img{
    width:250px;
    margin-top:20px;
    border-radius:20px;
    transition:0.5s;
}

.hero img:hover{
    transform:scale(1.1) rotate(-3deg);
}

/* STATS */
.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    padding:40px;
}

.box{
    background:rgba(255,255,255,0.2);
    padding:20px;
    border-radius:15px;
    text-align:center;
    transition:0.3s;
}

.box:hover{
    transform:scale(1.1);
    background:#ff69b4;
    color:#fff;
}

/* CARDS */
.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:40px;
}

.card{
    width:200px;
    height:120px;
    perspective:1000px;
}

.inner{
    width:100%;
    height:100%;
    transition:0.6s;
    transform-style:preserve-3d;
    position:relative;
}

.card:hover .inner{
    transform:rotateY(180deg);
}

.front,.back{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:15px;
    backface-visibility:hidden;
}

.front{background:#fff;color:#000;}
.back{background:#ff69b4;color:#fff;transform:rotateY(180deg);}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    background:rgba(0,0,0,0.6);
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

/* RESPONSIVE */
@media(max-width:600px){
    .hero h2{font-size:30px;}
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- NAV -->
<nav>
    <h1>💖 Girl Power</h1>
    <button onclick="toggleMode()">🌙 Mode</button>
</nav>

<!-- HERO -->
<section class="hero">
    <h2>Be Confident ✨</h2>
    <p>Strong | Independent | Beautiful</p>
    <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
</section>

<!-- STATS -->
<section class="stats" id="stats"></section>

<!-- CARDS -->
<section class="cards">
    <div class="card">
        <div class="inner">
            <div class="front">💄 Style</div>
            <div class="back">Fashion Queen</div>
        </div>
    </div>

    <div class="card">
        <div class="inner">
            <div class="front">📚 Smart</div>
            <div class="back">Brain Power</div>
        </div>
    </div>

    <div class="card">
        <div class="inner">
            <div class="front">💪 Strong</div>
            <div class="back">Never Give Up</div>
        </div>
    </div>
</section>

<footer>
    <p>Aesthetic UI 💖</p>
</footer>

<script>
// DARK MODE
function toggleMode(){
    document.body.classList.toggle("dark");
}

// DATA
const data = [
    {title:"Confidence", value:"100% 💖"},
    {title:"Style", value:"Unlimited ✨"},
    {title:"Goals", value:"Big Dreams 🌸"},
    {title:"Energy", value:"Positive 🔥"}
];

// LOAD DATA
let output="";
data.forEach(d=>{
    output+=`
    <div class="box">
        <h3>${d.title}</h3>
        <p>${d.value}</p>
    </div>`;
});

document.getElementById("stats").innerHTML=output;
</script>

</body>
</html>
